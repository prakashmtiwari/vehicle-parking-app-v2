<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #D9EAFD;
         }
        .card {
            background-color: #D9DFC6;
            border-radius: 10px;
        }
        .logo-container {
            text-align: center;
        }
        .logo-container img {
            max-width: 100%;
            height: auto;
        }
        .content-container {
            height: 100vh;
        }
        #flash-message {
        transition: opacity 0.5s ease-in-out;
        }  
    </style>
</head>
<body>

    {% include 'msg.html' with context %}

    <div class="container-fluid">
        <div class="row content-container align-items-center">
        
            <!-- Right Section: Login Card -->
            <div class="col-md-12 d-flex justify-content-center align-items-center">
                <div class="card shadow p-4" style="width: 25rem;">
                    <h2 class="text-center mb-4">Registration</h2>
                    <form action="{{ url_for('register') }}" method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username : </label>
                            <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password : </label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">Confirm Password : </label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Re-Enter your password" required>
                        </div>
                        <div class="mb-3">
                            <label for="fullname" class="form-label">Full Name : </label>
                            <input type="text" class="form-control" id="fullname" name="fullname" placeholder="Enter your Name" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email ID : </label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mt-4">Register</button>
                    </form><br>
                    <a href="{{ url_for('login_view') }}">Click here to Login</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        setTimeout(function() {
    let flashMessage = document.getElementById('flash-message');
    if (flashMessage) {
        flashMessage.style.opacity = '0';  // Start fade-out effect
        setTimeout(() => flashMessage.style.display = 'none', 500);  // Remove element after fade-out
    }
    }, 3000);
    </script>

</body>
</html>
