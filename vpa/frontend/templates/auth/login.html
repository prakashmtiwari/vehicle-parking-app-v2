<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #D9EAFD;
         }
        .card {
            background-color: #D9DFC6;
            border-radius: 10px;
        }
        .logo-container {
            text-align: center;
        }
        .logo-container img {
            max-width: 100%;
            height: auto;
        }
        .content-container {
            height: 100vh;
        }
        #flash-message {
        transition: opacity 0.5s ease-in-out;
        }  
    </style>
</head>
<body>

    {% include 'msg.html' with context %}

    <div class="container-fluid">
        <div class="row content-container align-items-center">
            <!-- Left Section: Logo -->
            <div class="col-md-6 d-flex justify-content-center align-items-center logo-container">
                <img src="{{ url_for('static', filename='images/parking.png') }}" alt="Logo" class="img-fluid" style="max-width: 300px;">
            </div>
            <!-- Right Section: Login Card -->
            <div class="col-md-6 d-flex justify-content-center align-items-center">
                <div class="card shadow p-4" style="width: 25rem;">
                    <h2 class="text-center mb-4">Login</h2>

                    <!--Login form-->
                    <form action="{{ url_for('login_view') }}" method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                        </div>
                        <!-- <div class="d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember" name="remember">
                                <label class="form-check-label" for="remember">Remember me</label>
                            </div>
                            <a href="#" class="text-decoration-none">Forgot password?</a>
                        </div> -->
                        <button type="submit" class="btn btn-primary w-100 mt-4">Login</button>
                    </form><br>
                    <a href="{{ url_for('register') }}">Click here to Register</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
     
    <script>
        setTimeout(function() {
    let flashMessage = document.getElementById('flash-message');
    if (flashMessage) {
        flashMessage.style.opacity = '0';  // Start fade-out effect
        setTimeout(() => flashMessage.style.display = 'none', 500);  // Remove element after fade-out
    }
    }, 3000);
    </script>
</body>
</html>
