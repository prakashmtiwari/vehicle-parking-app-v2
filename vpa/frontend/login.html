<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;

      /* Background image */
      background-image: url('static/images/parking.jpg');
      background-size: cover;        /* Scale to cover entire page */
      background-position: center;   /* Center the image */
      background-repeat: no-repeat;  /* Prevent tiling */
    }
    .card {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 350px;
    }
    h2 {
      margin-bottom: 1rem;
      text-align: center;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-bottom: 0.3rem;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    button {
      width: 100%;
      padding: 0.8rem;
      background: #28a745;
      color: white;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #1e7e34;
    }
    .message {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 6px;
      font-size: 0.9rem;
      text-align: center;
    }
    .success {
      background: #d4edda;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
    }
    .link {
      display: block;
      margin-top: 1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="card">
      <h2>Login</h2>
      <div class="form-group">
        <label>Email or Username</label>
        <input v-model="form.email" placeholder="Enter email or username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input v-model="form.password" type="password" placeholder="Enter password" />
      </div>
      <button @click="loginUser">Login</button>

      <div v-if="message" :class="['message', messageType]">
        {{ message }}
      </div>

      <a class="link" href="register.html">Don't have an account? Register</a><br>

      <a class="link" href="index.html">Home</a>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          form: {
            email: "",
            password: ""
          },
          message: "",
          messageType: ""
        };
      },
      methods: {
        async loginUser() {
          this.message = "";
          try {
            const res = await axios.post("http://127.0.0.1:5000/auth/login", this.form);
            this.message = res.data.message || "Login successful!";
            this.messageType = "success";

            // Example: save token if your backend returns JWT
            if (res.data.token) {
              localStorage.setItem("authToken", res.data.token);
              // Redirect to dashboard
              window.location.href = "dashboard.html";
            }

          } catch (err) {
            this.message = err.response?.data?.error || "Login failed";
            this.messageType = "error";
          }
        }
      }
    }).mount("#app");
  </script>
</body>
</html>
